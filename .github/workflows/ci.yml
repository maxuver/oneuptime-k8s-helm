name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint==1.35.1
      - run: yamllint -c .yamllint.yml .

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0
      - name: helm lint values.yaml syntax
        run: |
          helm version
          # We don't have the upstream chart in this repo, so this lint just
          # validates that values.yaml is a parseable YAML document.
          python -c "import yaml; yaml.safe_load(open('values/oneuptime.values.yaml'))"

  kubeval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate manifests
        run: kubeconform -strict -summary -skip ExternalSecret manifests/
